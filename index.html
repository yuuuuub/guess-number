<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜数字</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5;
    --card-bg: #fff;
    --text: #1a1a2e;
    --text-secondary: #555;
    --accent: #4361ee;
    --accent-hover: #3a56d4;
    --border: #e0e0e0;
    --input-bg: #f8f9fa;
    --history-bg: #f8f9fa;
    --success: #2ecc71;
    --danger: #e74c3c;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  [data-theme="dark"] {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --text: #e0e0e0;
    --text-secondary: #aaa;
    --accent: #6c83f7;
    --accent-hover: #5a6fe0;
    --border: #2a2a40;
    --input-bg: #252540;
    --history-bg: #252540;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    transition: background 0.3s, color 0.3s;
  }
  .container {
    width: 100%;
    max-width: 420px;
  }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    transition: background 0.3s;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  h1 { font-size: 1.5rem; }
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--text);
    transition: background 0.2s;
  }
  .theme-toggle:hover { background: var(--input-bg); }
  .difficulty { display: flex; gap: 8px; margin-bottom: 20px; }
  .diff-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .diff-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .diff-btn:hover:not(.active) { background: var(--input-bg); }
  .game-info { text-align: center; margin-bottom: 16px; }
  .range-hint { font-size: 0.9rem; color: var(--text-secondary); }
  .chances { font-size: 0.9rem; color: var(--text-secondary); margin-top: 2px; }
  .chances span { font-weight: 700; color: var(--accent); }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button {
    padding: 10px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: background 0.2s;
  }
  .input-row button:hover { background: var(--accent-hover); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  .message {
    text-align: center;
    font-weight: 600;
    margin-bottom: 12px;
    min-height: 24px;
    transition: all 0.2s;
  }
  .message.too-high { color: var(--danger); }
  .message.too-low { color: var(--accent); }
  .message.win { color: var(--success); font-size: 1.1rem; }
  .message.lose { color: var(--danger); }
  .history-section { margin-bottom: 16px; }
  .history-section h3 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 30px;
    padding: 8px;
    background: var(--history-bg);
    border-radius: 8px;
  }
  .history-list:empty::before {
    content: '暂无猜测记录';
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
  .history-item {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .history-item.high { background: #fde8e8; color: var(--danger); }
  .history-item.low { background: #e0e7ff; color: var(--accent); }
  .history-item.win { background: #d1fae5; color: var(--success); }
  [data-theme="dark"] .history-item.high { background: #3d1f1f; }
  [data-theme="dark"] .history-item.low { background: #1e2440; }
  [data-theme="dark"] .history-item.win { background: #1a3a2a; }
  .reset-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .reset-btn:hover { background: var(--accent-hover); }
  .high-score {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 12px;
  }
  .high-score strong { color: var(--accent); }

  /* end screen */
  .end-screen {
    display: none;
    text-align: center;
    padding: 10px 0;
  }
  .end-screen.show { display: block; }
  .end-screen .rating { font-size: 1.2rem; font-weight: 700; margin: 8px 0; }
  .end-screen .answer { color: var(--text-secondary); margin: 4px 0; }

  /* confetti animation */
  @keyframes confetti-fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes pop-in {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }
  .win-anim { animation: pop-in 0.5s ease-out; }
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confetti-fall 2s ease-out forwards;
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>🔢 猜数字</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
    </div>

    <div class="difficulty" id="difficulty">
      <button class="diff-btn" data-mode="easy">简单</button>
      <button class="diff-btn active" data-mode="normal">普通</button>
      <button class="diff-btn" data-mode="hard">困难</button>
    </div>

    <div class="game-info">
      <div class="range-hint" id="rangeHint">目标范围：1 ~ 100</div>
      <div class="chances">剩余机会：<span id="chancesLeft">7</span></div>
    </div>

    <div class="input-row" id="inputRow">
      <input type="number" id="guessInput" placeholder="输入你的猜测..." min="1" max="100" autocomplete="off">
      <button id="guessBtn">猜测</button>
    </div>

    <div class="message" id="message"></div>

    <div class="history-section">
      <h3>猜测历史</h3>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="end-screen" id="endScreen">
      <div class="rating" id="ratingText"></div>
      <div class="answer" id="answerText"></div>
      <button class="reset-btn win-anim" id="playAgainBtn">再来一局</button>
    </div>

    <button class="reset-btn" id="resetBtn" style="display:none;">再来一局</button>

    <div class="high-score" id="highScore">🏆 最佳记录：暂无</div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
(function() {
  const DIFFICULTIES = {
    easy:   { max: 50,  chances: 10, label: '简单 (1-50)' },
    normal: { max: 100, chances: 7,  label: '普通 (1-100)' },
    hard:   { max: 200, chances: 5,  label: '困难 (1-200)' }
  };

  let target = 0;
  let chances = 0;
  let maxNum = 100;
  let currentMode = 'normal';
  let guesses = [];
  let gameOver = false;

  const $ = id => document.getElementById(id);
  const rangeHint = $('rangeHint');
  const chancesLeft = $('chancesLeft');
  const guessInput = $('guessInput');
  const guessBtn = $('guessBtn');
  const message = $('message');
  const historyList = $('historyList');
  const endScreen = $('endScreen');
  const ratingText = $('ratingText');
  const answerText = $('answerText');
  const playAgainBtn = $('playAgainBtn');
  const resetBtn = $('resetBtn');
  const inputRow = $('inputRow');
  const highScoreEl = $('highScore');
  const confettiContainer = $('confettiContainer');
  const themeToggle = $('themeToggle');

  // Theme
  function getTheme() { return localStorage.getItem('guess-number-theme') || 'light'; }
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeToggle.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('guess-number-theme', t);
  }
  setTheme(getTheme());
  themeToggle.addEventListener('click', () => setTheme(getTheme() === 'dark' ? 'light' : 'dark'));

  // High score
  function getHighScore(mode) {
    const data = JSON.parse(localStorage.getItem('guess-number-hs') || '{}');
    return data[mode] || null;
  }
  function setHighScore(mode, score) {
    const data = JSON.parse(localStorage.getItem('guess-number-hs') || '{}');
    if (!data[mode] || score < data[mode]) {
      data[mode] = score;
      localStorage.setItem('guess-number-hs', JSON.stringify(data));
      return true;
    }
    return false;
  }
  function updateHighScoreDisplay() {
    const hs = getHighScore(currentMode);
    highScoreEl.innerHTML = hs !== null
      ? `🏆 ${DIFFICULTIES[currentMode].label} 最佳记录：<strong>${hs} 次</strong>`
      : `🏆 ${DIFFICULTIES[currentMode].label} 最佳记录：暂无`;
  }

  // Difficulty
  $('difficulty').addEventListener('click', e => {
    if (!e.target.classList.contains('diff-btn') || gameOver && guesses.length > 0 && endScreen.classList.contains('show')) return;
    // Allow mode change during game
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentMode = e.target.dataset.mode;
    startGame();
  });

  function startGame() {
    const cfg = DIFFICULTIES[currentMode];
    maxNum = cfg.max;
    chances = cfg.chances;
    target = Math.floor(Math.random() * maxNum) + 1;
    guesses = [];
    gameOver = false;

    rangeHint.textContent = `目标范围：1 ~ ${maxNum}`;
    chancesLeft.textContent = chances;
    guessInput.max = maxNum;
    guessInput.value = '';
    guessInput.disabled = false;
    guessBtn.disabled = false;
    guessInput.focus();
    message.textContent = '';
    message.className = 'message';
    historyList.innerHTML = '';
    endScreen.classList.remove('show');
    resetBtn.style.display = 'none';
    inputRow.style.display = 'flex';
    updateHighScoreDisplay();
  }

  function endGame(won) {
    gameOver = true;
    guessInput.disabled = true;
    guessBtn.disabled = true;
    inputRow.style.display = 'none';

    if (won) {
      message.textContent = `🎉 恭喜！数字就是 ${target}！`;
      message.className = 'message win';

      // Rating
      const count = guesses.length;
      let rating;
      if (count === 1) rating = '你开挂了？';
      else if (count <= 3) rating = '天才级别';
      else if (count <= 5) rating = '很不错';
      else if (count <= 7) rating = '还可以';
      else rating = '终于猜对了！';

      ratingText.textContent = rating;
      answerText.textContent = `答案是 ${target}，你用了 ${count} 次猜测`;
      endScreen.classList.add('show');
      resetBtn.style.display = 'none';

      // High score
      const isNew = setHighScore(currentMode, count);
      if (isNew) updateHighScoreDisplay();

      // Confetti
      spawnConfetti();

      // Mark last history item as win
      const items = historyList.querySelectorAll('.history-item');
      if (items.length) {
        items[items.length - 1].classList.add('win');
      }
    } else {
      message.textContent = `😢 机会用完了！答案是 ${target}`;
      message.className = 'message lose';
      ratingText.textContent = '再接再厉！';
      answerText.textContent = `答案是 ${target}`;
      endScreen.classList.add('show');
      resetBtn.style.display = 'none';
    }
  }

  function makeGuess() {
    if (gameOver) return;

    const val = parseInt(guessInput.value, 10);
    if (isNaN(val) || val < 1 || val > maxNum) {
      message.textContent = `请输入 1 ~ ${maxNum} 之间的数字`;
      message.className = 'message';
      return;
    }

    chances--;
    chancesLeft.textContent = chances;

    let cls, hint;
    if (val === target) {
      cls = 'win';
      hint = 'win';
      guesses.push({ val, cls });
      addHistoryItem(val, cls);
      endGame(true);
      return;
    } else if (val > target) {
      cls = 'high';
      hint = '📈 太大了！';
    } else {
      cls = 'low';
      hint = '📉 太小了！';
    }

    guesses.push({ val, cls });
    addHistoryItem(val, cls);
    message.textContent = hint;
    message.className = `message ${cls === 'high' ? 'too-high' : 'too-low'}`;

    if (chances <= 0 && val !== target) {
      endGame(false);
    }

    guessInput.value = '';
    guessInput.focus();
  }

  function addHistoryItem(val, cls) {
    const span = document.createElement('span');
    span.className = `history-item ${cls}`;
    span.textContent = `${val} ${cls === 'high' ? '⬇' : cls === 'low' ? '⬆' : '🎯'}`;
    historyList.appendChild(span);
  }

  function resetGame() {
    startGame();
  }

  // Confetti
  function spawnConfetti() {
    const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd',
                    '#00d2d3','#f368e0','#ff6348','#2ecc71','#e056a0','#f0932b'];
    const frag = document.createDocumentFragment();
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.animationDelay = Math.random() * 1.5 + 's';
      piece.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (Math.random() * 8 + 6) + 'px';
      piece.style.height = (Math.random() * 8 + 6) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      frag.appendChild(piece);
    }
    confettiContainer.appendChild(frag);
    setTimeout(() => { confettiContainer.innerHTML = ''; }, 3000);
  }

  // Events
  guessBtn.addEventListener('click', makeGuess);
  guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') makeGuess(); });
  playAgainBtn.addEventListener('click', resetGame);
  resetBtn.addEventListener('click', resetGame);

  // Start
  startGame();
})();
</script>
</body>
</html>
